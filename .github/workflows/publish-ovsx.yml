name: Publish to Open VSX

on:
    workflow_call:
        inputs:
            version:
                required: true
                type: string
        secrets:
            OPEN_VSX_TOKEN:
                required: true
    workflow_dispatch:
        inputs:
            version:
                description: "Version to publish (e.g. 0.5.0)"
                required: true
                type: string

jobs:
    publish:
        name: Publish to Open VSX
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Download VSIX from GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
                  VERSION: ${{ inputs.version }}
              run: gh release download "v$VERSION" --pattern "codehog.vsix"

            - name: Publish to Open VSX
              run: pnpm release:publish:ovsx -p "$OVSX_PAT"
              env:
                  OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
