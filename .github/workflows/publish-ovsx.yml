name: Publish to Open VSX

on:
    workflow_call:
        inputs:
            version:
                required: true
                type: string
            skip_tests:
                description: "Skip the test gate (only set true when called from release.yml after it already ran tests)"
                required: false
                type: boolean
                default: false
        secrets:
            OPEN_VSX_TOKEN:
                required: true
    workflow_dispatch:
        inputs:
            version:
                description: "Version to publish (e.g. 0.5.0)"
                required: true
                type: string

jobs:
    test:
        name: Tests (publish gate)
        # Run tests unless explicitly skipped (workflow_call from release.yml).
        # Manual workflow_dispatch always runs tests.
        if: github.event_name == 'workflow_dispatch' || inputs.skip_tests != true
        uses: ./.github/workflows/test.yml

    publish:
        name: Publish to Open VSX
        needs: test
        # Run publish if tests passed OR were skipped (release.yml gated).
        # `always()` is required so that a `skipped` test job doesn't block this job.
        if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Download VSIX from GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
                  VERSION: ${{ inputs.version }}
              run: gh release download "v$VERSION" --pattern "codehog.vsix"

            - name: Publish to Open VSX
              run: pnpm release:publish:ovsx -p "$OVSX_PAT"
              env:
                  OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
